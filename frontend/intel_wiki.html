<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10D Intelligence Wiki — Second Brain</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --v5-bg: #0a0b0d;
            --v5-card: #14161a;
            --v5-accent: #fbbf24;
            --v5-text: #e2e8f0;
        }
        body { background-color: var(--v5-bg); color: var(--v5-text); font-family: 'Inter', sans-serif; }
        .markdown-body h1 { @apply text-4xl font-extrabold mb-6 text-white border-b border-white/10 pb-4; }
        .markdown-body h2 { @apply text-2xl font-bold mt-8 mb-4 text-amber-400; }
        .markdown-body h3 { @apply text-xl font-semibold mt-6 mb-2 text-white; }
        .markdown-body p { @apply mb-4 leading-relaxed text-gray-400; }
        .markdown-body ul { @apply list-disc list-inside mb-4 text-gray-400; }
        .markdown-body code { @apply bg-white/5 px-1.5 py-0.5 rounded font-mono text-amber-200 text-sm; }
        .markdown-body pre { @apply bg-[#050505] p-4 rounded-xl border border-white/5 my-6 overflow-x-auto; }
        .markdown-body blockquote { @apply border-l-4 border-amber-500 pl-4 italic my-4 text-gray-500; }
        .sidebar-item:hover { background: rgba(251, 191, 36, 0.1); }
        .sidebar-item.active { background: rgba(251, 191, 36, 0.2); border-right: 3px solid var(--v5-accent); }
    </style>
</head>
<body class="flex h-screen overflow-hidden">
    <aside class="w-80 bg-[#0d0f12] border-r border-white/5 flex flex-col">
        <div class="p-6 border-b border-white/5">
            <div class="flex items-center gap-3 mb-2">
                <span class="material-icons-round text-amber-400">auto_stories</span>
                <h1 class="text-xl font-bold tracking-tight text-white uppercase">Intelligence Wiki</h1>
            </div>
            <p class="text-[10px] text-gray-500 font-mono tracking-widest uppercase">V5.0 Second Brain Online</p>
        </div>
            <div class="text-[10px] text-gray-600 font-bold uppercase tracking-widest mb-2 px-2">Navegação Visual</div>
            <a href="/intel/neural" target="_blank" class="w-full bg-amber-500/10 border border-amber-500/20 text-amber-400 p-3 rounded-xl flex items-center gap-3 transition-all text-sm hover:bg-amber-500/20 mb-6">
                <span class="material-icons-round">hub</span> 
                <div class="flex flex-col">
                    <span class="font-bold">Neural Intel Map</span>
                    <span class="text-[10px] opacity-60">Ver Ramificações (Force Graph)</span>
                </div>
            </a>


            <div class="text-[10px] text-gray-600 font-bold uppercase tracking-widest mb-2 px-2">Quartel General (MOCs)</div>
            <button onclick="loadNote('000 - INDEX - SOBERANIA.md')" class="sidebar-item w-full text-left p-3 rounded-lg flex items-center gap-3 transition-all text-sm active">
                <span class="material-icons-round text-amber-400">castle</span> Master Index
            </button>
            <button onclick="loadNote('MOC - Agentes da Frota.md')" class="sidebar-item w-full text-left p-3 rounded-lg flex items-center gap-3 transition-all text-sm">
                <span class="material-icons-round text-gray-500">groups</span> Agentes da Frota
            </button>
            <button onclick="loadNote('MOC - Gestao de Risco.md')" class="sidebar-item w-full text-left p-3 rounded-lg flex items-center gap-3 transition-all text-sm">
                <span class="material-icons-round text-gray-500">security</span> Gestão de Risco
            </button>

            <div class="text-[10px] text-gray-600 font-bold uppercase tracking-widest mt-6 mb-2 px-2">Notas Técnicas</div>
            <button onclick="loadNote('Agentes/CaptainAgent.md')" class="sidebar-item w-full text-left p-3 rounded-lg flex items-center gap-3 transition-all text-sm">
                <span class="material-icons-round text-gray-500">psychology</span> Captain Agent
            </button>
            <button onclick="loadNote('Agentes/LibrarianAgent.md')" class="sidebar-item w-full text-left p-3 rounded-lg flex items-center gap-3 transition-all text-sm">
                <span class="material-icons-round text-gray-500">menu_book</span> Librarian Agent
            </button>
            <button onclick="loadNote('Estrategia/Antecipacao_vs_Reacao.md')" class="sidebar-item w-full text-left p-3 rounded-lg flex items-center gap-3 transition-all text-sm">
                <span class="material-icons-round text-gray-500">rocket_launch</span> Estratégia V5
            </button>
        </nav>
        <div class="p-4 bg-black/20 border-t border-white/5">
            <a href="/10d" class="flex items-center gap-2 text-xs text-gray-500 hover:text-white transition-colors">
                <span class="material-icons-round text-sm">arrow_back</span> Voltar ao Cockpit
            </a>
        </div>
    </aside>
    <main class="flex-1 overflow-y-auto bg-black flex flex-col">
        <header class="h-16 border-b border-white/5 flex items-center px-10 justify-between sticky top-0 bg-black/80 backdrop-blur-md z-10">
            <div class="flex items-center gap-4">
                <span class="text-xs text-gray-600 font-mono" id="current-path">Agentes/CaptainAgent.md</span>
            </div>
        </header>
        <article class="max-w-4xl mx-auto py-16 px-6 w-full markdown-body" id="content">
            <div class="flex flex-col items-center justify-center h-64 text-gray-600">Sincronizando...</div>
        </article>
    </main>
    <script>
        async function loadNote(path) {
            const contentDiv = document.getElementById('content');
            const pathDisplay = document.getElementById('current-path');
            pathDisplay.innerText = path;
            try {
                const response = await fetch(`/intel/wiki_raw/${path}`);
                if (!response.ok) throw new Error('Nota não encontrada');
                const md = await response.text();
                contentDiv.innerHTML = marked.parse(md);
                document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
                event?.currentTarget?.classList.add('active');
            } catch (err) {
                contentDiv.innerHTML = `<div class="p-10 border border-red-500/20 bg-red-500/5 rounded-2xl text-red-400"><h1>Erro 404</h1><p>${err.message}</p></div>`;
            }
        }
        loadNote('Agentes/CaptainAgent.md');
    </script>
</body>
</html>
